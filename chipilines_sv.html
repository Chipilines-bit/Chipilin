<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chipilines Sv 2.0 - Naturaleza Viva</title>
    <style>
        :root {
            --Fondo: #e0f7fa;
            --Principal: #2e7d32;
            --Acento-Flor: #ff4081;
            --Texto-Oscuro: #1b5e20;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Comic Sans MS', 'Segoe UI', cursive, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #a5d6a7 0%, #e0f7fa 100%);
            color: var(--Texto-Oscuro);
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 50px;
            border: 3px solid var(--Principal);
        }

        header h1 { margin: 0 0 8px; font-size: 2rem; }
        header p { margin: 0; }

        #saveStatus {
            text-align: center;
            margin-bottom: 16px;
            color: var(--Principal);
            font-weight: bold;
            font-size: 14px;
            height: 20px;
        }

        #adminPanel {
            display: none;
            background: white;
            padding: 24px;
            border-radius: 25px;
            max-width: 500px;
            margin: 0 auto 40px;
            border: 2px solid var(--Acento-Flor);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        #adminPanel h3 {
            color: var(--Acento-Flor);
            text-align: center;
            margin-top: 0;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            position: relative;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .card img { width: 100%; height: 200px; object-fit: cover; display: block; }
        .card-body { padding: 20px; }
        .card-body h3 { color: var(--Principal); margin-top: 0; }
        .card-body p { margin: 0; line-height: 1.6; }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 12px;
            border: 2px solid #a5d6a7;
            font-family: inherit;
            font-size: 14px;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--Principal);
        }

        button.btn-publicar {
            background: var(--Principal);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            font-size: 16px;
            font-family: inherit;
        }

        button.btn-publicar:hover { background: #1b5e20; }

        #secretBtn {
            position: fixed;
            bottom: 15px;
            right: 15px;
            width: 40px;
            height: 40px;
            background: var(--Principal);
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.3s;
            z-index: 9999;
            font-size: 10px;
            font-family: inherit;
        }

        #secretBtn:hover { opacity: 1; }

        .btn-borrar {
            position: absolute;
            top: 10px;
            right: 10px;
            background: red;
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            display: none;
            z-index: 2;
        }

        #emptyMsg {
            text-align: center;
            font-size: 18px;
            opacity: 0.6;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <header>
        <h1>🌿 Chipilines Sv 2.0 🦜</h1>
        <p>Mural de Informacion del canal, aqui encontraras la informacion que se menciona en el canal</p>
    </header>

    <div id="saveStatus"></div>

    <div id="adminPanel">
        <h3>Panel Maestro 🔑</h3>
        <input type="text" id="titulo" placeholder="Nombre de la especie...">
        <input type="text" id="imgUrl" placeholder="Link de la imagen...">
        <textarea id="desc" rows="4" placeholder="Descripción detallada..."></textarea>
        <button class="btn-publicar" onclick="publicar()">Publicar 🚀</button>
    </div>

    <p id="emptyMsg" style="display:none;">Aún no hay tarjetas publicadas 🌿</p>
    <main class="grid-container" id="muro"></main>

    <button id="secretBtn" onclick="intentarEntrar()">Admin</button>

    <script>
        const STORAGE_KEY = 'chipilines-cards';
        const CLAVE = 'chipilin123';
        let esAdmin = false;
        let cards = [];

        // ── Cargar tarjetas guardadas ──
        function cargarCards() {
            try {
                const data = localStorage.getItem(STORAGE_KEY);
                cards = data ? JSON.parse(data) : [];
            } catch {
                cards = [];
            }
            renderAll();
        }

        // ── Guardar en localStorage ──
        function guardar() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(cards));
            mostrarStatus('✅ Guardado');
        }

        function mostrarStatus(msg) {
            const el = document.getElementById('saveStatus');
            el.textContent = msg;
            setTimeout(() => el.textContent = '', 2000);
        }

        // ── Renderizar todas las tarjetas ──
        function renderAll() {
            const muro = document.getElementById('muro');
            muro.innerHTML = '';
            document.getElementById('emptyMsg').style.display = cards.length === 0 ? 'block' : 'none';
            cards.forEach(card => muro.appendChild(crearElementoCard(card)));
        }

        // ── Crear elemento DOM de una tarjeta ──
        function crearElementoCard(card) {
            const div = document.createElement('div');
            div.className = 'card';
            div.dataset.id = card.id;

            const btnBorrar = document.createElement('button');
            btnBorrar.className = 'btn-borrar';
            btnBorrar.textContent = '×';
            btnBorrar.style.display = esAdmin ? 'block' : 'none';
            btnBorrar.onclick = () => borrar(card.id);

            const img = document.createElement('img');
            img.src = card.img || 'https://via.placeholder.com/400x200?text=Imagen+No+Cargada';
            img.alt = card.titulo;
            img.onerror = () => img.src = 'https://via.placeholder.com/400x200?text=Imagen+No+Cargada';

            const body = document.createElement('div');
            body.className = 'card-body';
            body.innerHTML = `<h3>${card.titulo}</h3><p>${card.desc}</p>`;

            div.appendChild(btnBorrar);
            div.appendChild(img);
            div.appendChild(body);
            return div;
        }

        // ── Publicar nueva tarjeta ──
        function publicar() {
            const t = document.getElementById('titulo').value.trim();
            const i = document.getElementById('imgUrl').value.trim();
            const d = document.getElementById('desc').value.trim();
            if (!t || !d) return alert('Faltan datos');

            const newCard = { id: Date.now(), titulo: t, img: i, desc: d };
            cards.unshift(newCard);
            guardar();
            renderAll();

            document.getElementById('adminPanel').style.display = 'none';
            document.getElementById('titulo').value = '';
            document.getElementById('imgUrl').value = '';
            document.getElementById('desc').value = '';
        }

        // ── Borrar tarjeta ──
        function borrar(id) {
            if (!confirm('¿Borrar esta tarjeta?')) return;
            cards = cards.filter(c => c.id !== id);
            guardar();
            renderAll();
            actualizarBotonesAdmin();
        }

        // ── Login admin ──
        function intentarEntrar() {
            if (esAdmin) {
                // Toggle panel si ya es admin
                const panel = document.getElementById('adminPanel');
                panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
                return;
            }
            const pass = prompt('Clave de acceso:');
            if (pass === CLAVE) {
                esAdmin = true;
                document.getElementById('adminPanel').style.display = 'block';
                actualizarBotonesAdmin();
            } else if (pass !== null) {
                alert('Clave incorrecta');
            }
        }

        function actualizarBotonesAdmin() {
            document.querySelectorAll('.btn-borrar').forEach(b => {
                b.style.display = esAdmin ? 'block' : 'none';
            });
        }

        // Atajo de teclado: tecla S
        document.addEventListener('keydown', e => {
            if (e.key.toLowerCase() === 's' && !['INPUT','TEXTAREA'].includes(e.target.tagName)) {
                intentarEntrar();
            }
        });

        // ── Iniciar ──
        cargarCards();
    </script>
</body>
</html>
